name: Liverpool Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright gspread google-auth google-auth-oauthlib requests openpyxl pandas
          playwright install chromium
          playwright install-deps chromium

      - name: Create credentials file
        run: |
          echo '${{ secrets.CREDENTIALS_JSON }}' > credentials.json

      - name: Run bot
        run: python main.py
